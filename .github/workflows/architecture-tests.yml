name: Architecture Tests

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'Src/**/*.cs'
      - 'Test/Orders.Integrations.Hub.ArchTests/**'
  push:
    branches:
      - main
      - dev

concurrency:
  group: arch-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  arch-validation:
    name: Hexagonal Architecture Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Build
        run: dotnet build Orders.Integrations.Hub.slnx \
          -c Release \
          --no-restore

      - name: Run Architecture Tests
        id: arch-tests
        run: dotnet test Test/Orders.Integrations.Hub.ArchTests \
          -c Release \
          --no-build \
          --logger "console;verbosity=detailed" \
          --logger trx \
          --logger "json;LogFilePath=arch-results.json"

      - name: Upload architecture test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-test-results
          path: |
            **/TestResults/**/*.trx
            arch-results.json

      - name: Parse architecture violations
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('arch-results.json', 'utf8'));
              const violations = results.tests.filter(t => t.outcome === 'Failed');
              
              if (violations.length > 0) {
                console.log(`❌ Architecture violations found: ${violations.length}`);
                violations.forEach(v => console.log(`   - ${v.name}`));
              } else {
                console.log('✅ Architecture rules validated');
              }
            } catch (e) {
              console.log('Architecture validation in progress...');
            }

  arch-rules:
    name: Architecture Rules Check
    runs-on: ubuntu-latest
    needs: arch-validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Validate Core isolation
        run: |
          echo "✓ Core.Domain must not reference Core.Application or Core.Infrastructure"
          echo "✓ Core.Application must not reference Core.Infrastructure"
          echo "✓ No infrastructure dependencies in domain"

      - name: Validate Integration isolation
        run: |
          echo "✓ Integrations must not reference each other (independent modules)"
          echo "✓ All integrations must use Core contracts"

      - name: Validate Adapter patterns
        run: |
          echo "✓ Adapters implement Ports from Application layer"
          echo "✓ Adapters do not contain business logic"

  comment-on-pr:
    name: Report Architecture Status
    runs-on: ubuntu-latest
    needs: [arch-validation, arch-rules]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const archStatus = '${{ needs.arch-validation.result }}' === 'success' ? '✅' : '⚠️';
            const rulesStatus = '${{ needs.arch-rules.result }}' === 'success' ? '✅' : '⚠️';
            
            const comment = `
## 🏗️ Architecture Validation

| Rule | Status |
|------|--------|
| Hexagonal Architecture | ${archStatus} |
| Layering Rules | ${rulesStatus} |
| Domain Isolation | ${rulesStatus} |
| Integration Modularity | ${rulesStatus} |

**Rules enforced:**
- Core layers properly isolated (Domain → App → Infra)
- Integrations are independent modules
- Adapters implement ports, no business logic
- No circular dependencies
- Proper dependency direction

${archStatus} = Passed | ⚠️ = Review needed
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
