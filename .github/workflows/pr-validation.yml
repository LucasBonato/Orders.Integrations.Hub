name: PR Validation

on:
  pull_request:
    branches:
      - main
      - dev
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  validate:
    name: Code Style & Format
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for analysis

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Check StyleCop violations
        run: |
          dotnet build Orders.Integrations.Hub.slnx \
            -c Release \
            --no-restore \
            -p:EnforceCodeStyleInBuild=true \
            -p:TreatWarningsAsErrors=true \
            /p:StyleCopEnabled=true 2>&1 | tee stylecop.log

      - name: Upload StyleCop report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stylecop-report
          path: stylecop.log

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  quick-test:
    name: Quick Unit Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Build
        run: dotnet build Orders.Integrations.Hub.slnx \
          -c Release \
          --no-restore

      - name: Run Unit Tests
        run: dotnet test Test/Orders.Integrations.Hub.UnitTests \
          -c Release \
          --no-build \
          --logger trx \
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: "**/TestResults/**/*.trx"

  check-nullable:
    name: Nullable Reference Types
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Check nullable reference types
        run: dotnet build Orders.Integrations.Hub.slnx \
          -c Release \
          --no-restore \
          -p:Nullable=enable \
          -p:TreatWarningsAsErrors=true

  summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest
    needs: [validate, quick-test, check-nullable]
    if: always()

    steps:
      - name: Check validation status
        run: |
          if [[ "${{ needs.validate.result }}" == "failure" ]] || \
             [[ "${{ needs.quick-test.result }}" == "failure" ]] || \
             [[ "${{ needs.check-nullable.result }}" == "failure" ]]; then
            echo "❌ PR Validation FAILED"
            exit 1
          fi
          echo "✅ PR Validation PASSED"
