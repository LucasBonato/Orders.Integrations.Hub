name: Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  COVERAGE_THRESHOLD: 70

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Build
        run: |
          dotnet build Orders.Integrations.Hub.slnx \
            -c Release \
            --no-restore

      - name: Run Unit Tests
        run: |
          dotnet test Test/Orders.Integrations.Hub.UnitTests \
            -c Release \
            --no-build \
            --logger "console;verbosity=minimal" \
            --logger trx \
            --collect:"XPlat Code Coverage" \
            -- RunConfiguration.DisableAppDomain=true
          
          echo ""
          echo "Coverage files:"
          find . -name "coverage.cobertura.xml"
      
          echo ""
          echo "TestResults:"
          find . -name "TestResults" -type d

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: "**/coverage.cobertura.xml"
          flags: unittests
          name: unit-tests-coverage
          fail_ci_if_error: false

      - name: Prepare coverage files
        run: |
          mkdir -p coverage-data
          find . -name 'coverage.cobertura.xml' -exec cp {} coverage-data/ \;

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage-data/

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: "**/TestResults/**/*.trx"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Build
        run: |
          dotnet build Orders.Integrations.Hub.slnx \
            -c Release \
            --no-restore

      - name: Run Integration Tests
        run: |
          dotnet test Test/Orders.Integrations.Hub.IntegrationTests \
            -c Release \
            --no-build \
            --logger "console;verbosity=minimal" \
            --logger trx \
            --collect:"XPlat Code Coverage"
        env:
          CACHE__MODE: "Memory"
          MESSAGE_BROKER__MODE: "Memory"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: "**/coverage.cobertura.xml"
          flags: integration
          name: integration-tests-coverage
          fail_ci_if_error: false

      - name: Prepare coverage files
        run: |
          mkdir -p coverage-data
          find . -name 'coverage.cobertura.xml' -exec cp {} coverage-data/ \;

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: coverage-data/

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: "**/TestResults/**/*.trx"

  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Build
        run: |
          dotnet build Orders.Integrations.Hub.slnx \
            -c Release \
            --no-restore

      - name: Run Architecture Tests
        run: |
          dotnet test Test/Orders.Integrations.Hub.ArchTests \
            -c Release \
            --no-build \
            --logger "console;verbosity=minimal" \
            --logger trx

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: arch-test-results
          path: "**/TestResults/**/*.trx"

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Download unit coverage
        if: needs.unit-tests.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: coverage-unit
          path: coverage-input/unit

      - name: Download integration coverage
        if: needs.integration-tests.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: coverage-integration
          path: coverage-input/integration

      - name: Generate coverage report
        run: |
          reports=$(find coverage-input -name 'coverage.cobertura.xml' 2>/dev/null | tr '\n' ';')
          if [ -z "$reports" ]; then
            echo "⚠️ No coverage data available (tests failed)." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          reportgenerator \
            -reports:"$reports" \
            -targetdir:./coverage-html \
            -reporttypes:HtmlInline_AzurePipelines;Cobertura \
            -assemblyfilters:"+Orders.Integrations.Hub*"

      - name: Output coverage summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f ./coverage-html/Cobertura.xml ]; then
            COVERAGE=$(grep -o 'line-rate="[0-9.]*"' ./coverage-html/Cobertura.xml | head -1 | grep -o '[0-9.]*')
            COVERAGE_PCT=$(echo "$COVERAGE * 100" | bc -l | xargs printf "%.1f")
            echo "**Overall coverage: $COVERAGE_PCT%**" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage data not available from all sources." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See attached HTML report for detailed breakdown." >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: hashFiles('./coverage-html/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./coverage-html
          retention-days: 14
