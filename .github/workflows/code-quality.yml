name: Code Quality & Security

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  sast-scan:
    name: SAST Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST Scan
        run: |
          semgrep scan \
            --config=p/csharp \
            --config=p/owasp-top-ten \
            --config=p/security-audit \
            --sarif \
            --output=semgrep.sarif || true

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Check vulnerabilities
        run: dotnet list package --vulnerable --include-transitive

      - name: Check outdated packages
        run: dotnet outdated Orders.Integrations.Hub.slnx --exit-code 1 --options Prerelease=false || true

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Build with analyzers
        run: dotnet build Orders.Integrations.Hub.slnx -c Release /p:RunAnalyzers=true

  code-duplication:
    name: Code Duplication Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install jscpd
        run: npm install -g jscpd

      - name: Detect duplication
        run: jscpd Src/ --min-lines 10 --reporters json || true

  licensing-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Export packages
        run: |
          dotnet list package --format json > packages.json
          echo "Package list generated"

      - name: Upload package list
        uses: actions/upload-artifact@v7
        with:
          name: packages-list
          path: packages.json

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    needs: [sast-scan, dependency-check, code-quality, code-duplication, licensing-check]
    if: always()

    steps:
      - name: Evaluate status
        run: |
          if [[ "${{ needs.sast-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.dependency-check.result }}" == "failure" ]]; then
            echo "❌ Quality Gate FAILED"
            exit 1
          fi

          echo "✅ Quality Gate PASSED"

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const sast = '${{ needs.sast-scan.result }}' === 'success' ? '✅' : '⚠️';
            const deps = '${{ needs.dependency-check.result }}' === 'success' ? '✅' : '⚠️';
            const quality = '${{ needs.code-quality.result }}' === 'success' ? '✅' : '⚠️';
            const dup = '${{ needs.code-duplication.result }}' === 'success' ? '✅' : '⚠️';
            const lic = '${{ needs.licensing-check.result }}' === 'success' ? '✅' : '⚠️';

            const comment = [
              '| Check | Status |',
              '|------|--------|',
              `| 🔍 SAST | ${sast} |`,
              `| 📦 Dependencies | ${deps} |`,
              `| 📊 Code Quality | ${quality} |`,
              `| 🔄 Duplication | ${dup} |`,
              `| 📋 Licenses | ${lic} |`,
              '',
              `Run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });