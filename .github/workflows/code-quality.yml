name: Code Quality & Security

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  sast-scan:
    name: SAST Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          generateSarif: true
          config: >-
            p/csharp
            p/owasp-top-ten
            p/security-audit

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Run dotnet list package vulnerabilities
        run: dotnet list package --vulnerable --include-transitive

      - name: Check for outdated packages
        run: dotnet outdated Orders.Integrations.Hub.slnx --exit-code 1 --options Prerelease=false || true

  code-complexity:
    name: Code Complexity Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install complexity analyzer
        run: dotnet tool install -g Metriculator

      - name: Analyze complexity
        run: |
          metriculator Src/Orders.Integrations.Hub \
            --output complexity-report.json \
            --threshold 15 || true

      - name: Upload complexity report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: complexity-report
          path: complexity-report.json

  code-duplication:
    name: Code Duplication Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install SimSharp (duplication detector)
        run: dotnet tool install -g SimSharp

      - name: Detect code duplication
        run: |
          simsharp Src/Orders.Integrations.Hub \
            --threshold 3 \
            --min-fragment-size 10 || true

  licensing-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Check licenses
        run: dotnet list package --format json > packages.json && \
          echo "Review licenses in artifacts"

      - name: Upload package list
        uses: actions/upload-artifact@v7
        with:
          name: packages-list
          path: packages.json

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [ sast-scan, dependency-check, code-complexity, code-duplication, licensing-check ]
    if: always()

    steps:
      - name: Check quality gate status
        run: |
          if [[ "${{ needs.sast-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.dependency-check.result }}" == "failure" ]]; then
            echo "❌ Quality Gate FAILED - Security/Dependency issues"
            exit 1
          fi
          echo "✅ Quality Gate PASSED"

      - name: Comment PR with quality summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const sast = '${{ needs.sast-scan.result }}' === 'success' ? '✅' : '⚠️';
            const dependency = '${{ needs.dependency-check.result }}' === 'success' ? '✅' : '⚠️';
            const complexity = '${{ needs.code-complexity.result }}' === 'success' ? '✅' : '⚠️';
            const duplication = '${{ needs.code-duplication.result }}' === 'success' ? '✅' : '⚠️';
            const licenses = '${{ needs.licensing-check.result }}' === 'success' ? '✅' : '⚠️';

            const comment = [
              '| Check | Status |',
              '|-------|--------|',
              `| 🔍 SAST Scan | ${sast} |`,
              `| 📦 Dependency Scan | ${dependency} |`,
              `| 📊 Complexity | ${complexity} |`,
              `| 🔄 Duplication | ${duplication} |`,
              `| 📋 Licenses | ${licenses} |`,
              '',
              `See workflow run for details: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });