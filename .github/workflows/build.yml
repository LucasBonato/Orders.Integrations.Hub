name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

env:
  DOTNET_VERSION: "10.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Display .NET version
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx
        env:
          NUGET_XMLDOC_MODE: skip

      - name: Build Release
        run: |
          dotnet build Orders.Integrations.Hub.slnx \
            -c Release \
            --no-restore \
            -p:ContinuousIntegrationBuild=true \
            -p:DeterministicBuild=true

      - name: Run all tests
        run: | 
          dotnet test Orders.Integrations.Hub.slnx \
            -c Release \
            --no-build \
            --logger "console;verbosity=minimal" \
            --logger trx

      - name: Publish application
        run: | 
          dotnet publish Src/Orders.Integrations.Hub/Orders.Integrations.Hub.csproj \
            -c Release \
            --no-build \
            -o ./publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: ./publish
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/TestResults/**/*.trx"

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Build FAILED"
            exit 1
          fi
          echo "✅ Build PASSED"

      - name: Create build badge
        run: |
          echo "Build Status: ✅ PASSED" > build-status.txt
          echo "Version: ${{ github.sha }}" >> build-status.txt

      - name: Upload build status
        uses: actions/upload-artifact@v7
        with:
          name: build-status
          path: build-status.txt
