name: Quality

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  format:
    name: Code Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Check formatting
        run: |
          dotnet format Orders.Integrations.Hub.slnx \
            --verify-no-changes \
            --verbosity minimal

  analyzers:
    name: Code Analyzers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Build with analyzers
        run: |
          dotnet build Orders.Integrations.Hub.slnx \
            -c Release \
            --no-restore \
            -p:RunAnalyzers=true \
            -p:TreatWarningsAsErrors=true \
            -p:EnforceCodeStyleInBuild=true

  nullable:
    name: Nullable Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Orders.Integrations.Hub.slnx

      - name: Check nullable reference types
        run: |
          dotnet build Orders.Integrations.Hub.slnx \
            -c Release \
            --no-restore \
            -p:Nullable=enable \
            -p:TreatWarningsAsErrors=true
